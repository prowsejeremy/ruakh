<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="text-scale" content="scale" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#f7a31a" />
    <link rel="apple-touch-icon" href="/app-icons/ruakh-182x182.png" />
    <script>
      // Apply the saved theme before first paint — no flash of the default palette.
      // NOTE: inline + un-nonced. If a CSP is ever added, use SvelteKit's `csp`
      // config (it auto-hashes app.html inline scripts) — don't add a bare
      // script-src header at a proxy or this flash-prevention silently breaks.
      try {
        var s = document.documentElement.style;
        var m = document.querySelector('meta[name="theme-color"]');
        // hex (#rgb or #rrggbb) -> "r, g, b" — mirrors hexToRgb in client/theme.ts.
        var toRgb = function (hex) {
          var h = hex.replace("#", "");
          if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
          var n = parseInt(h, 16);
          return ((n >> 16) & 255) + ", " + ((n >> 8) & 255) + ", " + (n & 255);
        };
        // Set --color-<name> and its --color-<name>-rgb companion together.
        var setColor = function (name, hex) {
          s.setProperty("--color-" + name, hex);
          s.setProperty("--color-" + name + "-rgb", toRgb(hex));
        };
        // The /admin area uses a fixed dark palette instead of the saved theme.
        // Mirrors ADMIN_THEME in src/lib/themes.ts — keep the hex values in sync.
        if (location.pathname.indexOf("/admin") === 0) {
          setColor("bg", "#111111");
          setColor("ink", "#f9f8f6");
          if (m) m.setAttribute("content", "#111111");
        } else {
          var t = JSON.parse(localStorage.getItem("ruakh:theme"));
          if (t && t.bg) {
            setColor("bg", t.bg);
            setColor("accent", t.accent || t.line); // `line` = pre-rename snapshots
            setColor("ink", t.ink);
            if (m) m.setAttribute("content", t.bg);
          }
        }
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
