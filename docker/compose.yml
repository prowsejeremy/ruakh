# Production stack for Lightsail. The app image is built + shipped by the
# deploy/ scripts (docker load from a tar); env files are synced in by the
# GitHub Actions workflow. Run `docker compose up -d` from this directory on
# the instance.
name: ruakh
services:
  app:
    # Must match the tag used by deploy/build.sh (docker build -t ruakh).
    image: ruakh:latest
    restart: always
    env_file:
      - .env.app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - app-network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt:rw
      - ./certbot/www:/var/www/certbot:rw

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env.db
    healthcheck:
      # $$ escapes compose interpolation so the shell expands these at runtime.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      # Persist on the attached block-storage disk, mirroring the jpd-portfolio layout.
      - /mnt/ebs/ruakh/pgdata:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
